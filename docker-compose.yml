version: "3.9"

# ============================================================
# Workspace: meeting-room
# Ports are read from .env (auto-generated by create-workspace.ps1)
#
# Services:
#   web   → ${WEB_PORT}:${WEB_PORT}
#   api   → ${API_PORT}:${API_PORT}
#   admin → ${ADMIN_PORT}:${ADMIN_PORT}
#
# To add PostgreSQL, append the 'db' service block below and
# uncomment DATABASE_URL in .env.
# ============================================================

networks:
  ai-dev-network:
    external: true
  local:
    driver: bridge

services:

  # ── Web ───────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: meeting-room-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT:     ${WEB_PORT}
      API_URL:  http://api:${API_PORT}
    networks:
      - ai-dev-network
      - local
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Admin ─────────────────────────────────────────────────
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: meeting-room-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT}:${ADMIN_PORT}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT:     ${ADMIN_PORT}
      API_URL:  http://api:${API_PORT}
    networks:
      - ai-dev-network
      - local
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── API ───────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: meeting-room-api
    restart: unless-stopped
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      NODE_ENV:     ${NODE_ENV:-development}
      PORT:         ${API_PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET:   ${JWT_SECRET}
    networks:
      - ai-dev-network
      - local
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

